<!DOCTYPE html>
<html>
<head>
    <title>Cryptocurrency Trading Charts</title>
    <!-- include the Highcharts library -->
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <!-- include the jQuery library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // initialize the chart
        var chart;
        $(document).ready(function() {
            chart = Highcharts.stockChart('container', {
                rangeSelector: {
                    selected: 1
                },
                title: {
                    text: 'Select a Cryptocurrency'
                },
                xAxis: {
                    type: 'datetime'
                },
                yAxis: {
                    title: {
                        text: 'Price'
                    }
                },
                series: []
            });
        });
        // update the chart when a cryptocurrency is selected
        function selectCrypto(crypto) {
            $.ajax({
                url: "trading_chart.php",
                data: { cryptocurrency : crypto },
                success: function(data) {
                    var chartData = JSON.parse(data);
                    chart.setTitle({ text: chartData.title });
                    for (var i = 0; i < chartData.series.length; i++) {
                        chart.series[i].setData(chartData.series[i].data);
                        chart.series[i].update({ name: chartData.series[i].name });
                    }
                }
            });
        }
    </script>
    <style>
        /* customize the look of the chart container */
        #container {
            height: 400px;
            min-width: 310px;
            max-width: 800px;
            margin: 0 auto;
        }
        /* customize the look of the cryptocurrency selector */
        #cryptocurrency {
            display: inline-block;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        #cryptocurrency option {
            padding: 5px;
        }
    </style>
</head>
