<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crypto Trading Charts</title>
  <script src="https://code.highcharts.com/highcharts.js"></script>
  <script src="https://code.highcharts.com/modules/exporting.js"></script>
  <script src="https://code.highcharts.com/modules/export-data.js"></script>
  <link rel="stylesheet" href="nu.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="#">Trade</a></li>
        <li><a href="#">Markets</a></li>
        <li><a href="#">Portfolio</a></li>
        <li><a href="#">Resources</a></li>
      </ul>
      <div class="search-container">
        <form action="#">
          <input type="text" placeholder="Search...">
          <button type="submit"><i class="fa fa-search"></i></button>
        </form>
      </div>
    </nav>
  </header>
  <div class="container">
    <h1>Crypto Trading Charts</h1>
    <div id="chart-container" class="chart-container"></div>
  </div>
  <footer>
    <p>&copy; 2023 Crypto Trading</p>
  </footer>
  <script>
    Highcharts.chart('chart-container', {
      chart: {
        type: 'line'
      },
      title: {
        text: 'Crypto Trading Chart'
      },
      xAxis: {
        categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
      },
      yAxis: {
        title: {
          text: 'Price (USD)'
        }
      },
      series: [{
        name: 'BTC/USD',
        data: [10000, 12000, 8000, 9000, 11000, 13000, 14000, 12000, 10000, 9000, 11000, 12000]
      },
      {
        name: 'ETH/USD',
        data: [500, 600, 400, 450, 550, 650, 700, 600, 500, 450, 550, 600]
      },
      {
        name: 'LTC/USD',
        data: [100, 120, 80, 90, 110, 130, 140, 120, 100, 90, 110, 120]
      }]
    });
  </script>
</body>
</html>
